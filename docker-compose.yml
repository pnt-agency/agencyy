services:
  db:
    image: postgres:17
    container_name: agency-build-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agencybuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agencybuild}
      POSTGRES_DB: ${POSTGRES_DB:-agencybuild}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agency_build_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agencybuild} -d ${POSTGRES_DB:-agencybuild}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agency_build_pgdata:
    name: agency_build_pgdata
